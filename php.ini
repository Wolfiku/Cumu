; ========================================
; DATEISHARING-APP - PHP KONFIGURATION
; ========================================

; Gefährliche Funktionen deaktivieren
disable_functions=exec,passthru,shell_exec,system,proc_open,proc_close,proc_get_status,popen,show_source,highlight_file,escapeshellcmd,escapeshellarg,pcntl_exec

; Externe Zugriffe deaktivieren
allow_url_fopen=Off
allow_url_include=Off

; Sicherheit
expose_php=Off
display_errors=Off
log_errors=On
error_log=/share/Web/dateishare/logs/php_errors.log

; Session-Sicherheit
session.use_strict_mode=1
session.cookie_httponly=1
session.cookie_secure=1
session.cookie_samesite=Strict
session.use_only_cookies=1

; Uploads deaktiviert
file_uploads=Off

; Limits
memory_limit=64M
max_execution_time=60
max_input_time=60
max_input_vars=500
